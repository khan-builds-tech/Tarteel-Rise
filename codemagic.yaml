# Codemagic CI/CD Configuration for Tarteel Rise (Native Android / Kotlin)
workflows:
  android-build:
    name: Tarteel Rise APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      groups:
        - keystore_credentials # Optional: Configure your signing credentials in Codemagic environment variables
      vars:
        PACKAGE_NAME: "com.example"
      android_sdk: true
      java: 17
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    scripts:
      - name: Set up local.properties and accept SDK licenses
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          yes | sdkmanager --licenses || true
      - name: Build Android Debug APK
        script: |
          ./gradlew assembleDebug
      - name: Build Android Release App Bundle (AAB)
        script: |
          ./gradlew bundleRelease
    artifacts:
      - app/build/outputs/apk/**/*.apk
      - app/build/outputs/bundle/**/*.aab
    publishing:
      email:
        recipients:
          - aman0786khan@gmail.com
        notify:
          success: true
          failure: true
